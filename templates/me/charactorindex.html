<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- CSRF -->
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_parameter" th:content="${_csrf.parameterName}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />

  <title>トイタビ – キャラクター一覧</title>
  <!--CSSファイルを読み込む-->
  <link rel="stylesheet" href="../../static/css/common.css" th:href="@{/css/common.css}">
  <link rel="stylesheet" href="../../static/css/home.css" th:href="@{/css/home.css}">
</head>


<body>
  <!--Thymeleaf の値を JavaScript内で使えるようにして、Thymeleaf の値を JavaScript内で使えるようにする-->
  <script th:inline ="javascript">
    const data =/*[[${data}]]*/{}
  </script>
  <!--CSSレイアウト制御用の画面全体を囲うコンテナ-->
  <div class="screen">
    <!-- Header -->
    <header class="app-header">
      <img class = "header-logo-img" src="..\..\static\asset\images\logo.png" th:src="@{/asset/images/logo.png}"/>
      <p class="lead">トイタビに出かけよう！<br>エリアを選んでね</p>
      <button class = "menu-btn"id ="menu-btn">
        <p>メニュー</p>
        <img class = "icon-img" src="..\..\static\asset\images\menulogo.png" th:src="@{/asset/images/menulogo.png}"/>
      </button>
    </header>
    <!--メニューの画面-->
    <nav id="side-menu" class="side-menu">
      <h1 class="menu-title">メニュー</h1>
      <ul>
        <li><button class = "menu-content-btn" onclick="location.href='/'">
          <img class src ="../../static/asset/images/icon/homeicon.png" th:src="@{/asset/images/icon/homeicon.png}"/>
          <p>ホーム画面へ戻る</p>
        </button></li>
      </ul>
      <button class="menu-close-btn">閉じる</button>
    </nav>

    <!-- Main Content -->
    <main class ="content">
     <!--レイアウト用のラッパー-->
     <div class="container">
        <h2 class="section-title">キャラクター一覧</h2>
        <div class = "charactor-conatainer">
          <!--キャラクターのカードを繰り返し表示-->
          <div class="charactor-card" th:each="charactor : ${charactors}">
            <img class="charactor-image" th:src="@{${charactor.lowimageUrl}}" alt="キャラクター画像">
            <h3 class="charactor-name" th:text="${charactor.name}">キャラクター名</h3>
          </div>
        </div>
      </div>
    </main>
    <!-- Footer -->
    <footer class="app-footer">
      <!-- Bottom actions -->
      <div class="bottom-actions">
        <!--投稿画面へ遷移-->
        <button class="action-btn" type="button" onclick= "location.href='/'" >
          <!--ボタンのラベル-->
          <div class="caption">ホームへ戻る</div>
          <!--ホームアイコン-->
          <img class = "icon-img" src = "../../static/asset/images/icon/homeicon.png" th:src="@{/asset/images/icon/homeicon.png}"/>
        </button>
      </div> 
    </footer>
  
  <!-- Leaflet JSライブラリ -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- menu制御スクリプトとhomeの制御スクリプト -->
  <script src ="../../static/js/common.js" th:src="@{/js/common.js}"></script>
  <script src="../../static/js/pages/home.js" th:src="@{/js/pages/home.js}"></script>
</body>
</html>
