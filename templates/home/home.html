<!doctype html>
<html lang="ja" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- CSRF -->
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_parameter" th:content="${_csrf.parameterName}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />

  <title>トイタビ – エリア選択</title>
  <!--CSSファイルを読み込む-->
  <link rel="stylesheet" href="../../static/css/common.css" th:href="@{/css/common.css}">
  <link rel="stylesheet" href="../../static/css/home.css" th:href="@{/css/home.css}">
<!--Leaflet（地図表示ライブラリ）の CSS をCDNから読み込み-->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<!--Leafletの JavaScript本体-->
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>
<!--jscookieのライブラリを読み込む-->
<script src="
https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js
"></script>
</head>


<body>
  <!--Thymeleaf の値を JavaScript内で使えるようにして、Thymeleaf の値を JavaScript内で使えるようにする-->
  <script th:inline ="javascript">
    const data =/*[[${data}]]*/{}
  </script>

  <!--CSSレイアウト制御用の画面全体を囲うコンテナ-->
  <div class="screen">
    <!-- Header -->
    <header class="app-header">
      <img class = "header-logo-img" src="..\..\static\asset\images\logo.png" th:src="@{/asset/images/logo.png}"/>
      <p class="lead">トイタビに出かけよう！<br>エリアを選んでね</p>
      <button class = "menu-btn"id ="menu-btn">
        <p>メニュー</p>
        <img class = "icon-img" src="..\..\static\asset\images\menulogo.png" th:src="@{/asset/images/menulogo.png}"/>
      </button>
    </header>
    <!--メニューの画面-->
    <nav id="side-menu" class="side-menu">
      <div class ="menu-header">
        <h1 class="menu-title">メニュー</h1>
        <!--ログイン情報-->
        <button class="user-info-btn" sec:authorize="isAuthenticated()" onclick="location.href='/mypage'">
          <span class="username"
                sec:authentication="name">
          </span>
        </button>
        <!-- 未ログイン -->
        <button class="user-info-btn" sec:authorize="isAnonymous()"onclick="location.href='/login'">
          <span class="username">ログイン</span>
        </button>
      </div>
      <ul>
        <li><button class = "menu-content-btn" onclick="location.href='/'">
          <img class src ="../../static/asset/images/icon/icon_home.png" th:src="@{/asset/images/icon/icon_home.png}"/>
          <p>ホーム画面へ戻る</p>
        </button></li>
        <li><button class = "menu-content-btn" onclick="location.href='/me/characterindex'">
          <img class src ="../../static/asset/images/icon/icon_library.png" th:src="@{/asset/images/icon/icon_library.png}"/>
          <p>My図鑑</p>
        </button></li>
      </ul>
      <button class="menu-close-btn">閉じる</button>
    </nav>

    <!-- Main Content -->
    <main class ="content">
     <!--レイアウト用のラッパー-->
     <div class="container">
       <!--エリア選択UI用の領域-->
       <div class="buttonareas">
          <!--continueボタン-->
          <button id="continue-btn" class="continue-btn">
            <!--アイコンを丸く囲う-->
            <div class="icon-circle">
              <!--アイコン画像-->
              <img src="../../static/asset/images/totyuicon.png" th:src="@{/asset/images/totyuicon.png}">
            </div>
            <!--ボタンの文字-->
            <span class="label">途中から</span>
          </button>
          <!--ここにエリアやゾーンが入る-->
          <!--エリアカードのテンプレート-->
          <template id="area-card-template">
            <div class="area-card-caontainer">
              <button class="area-card">
                <!--アイコンを丸く囲う-->
                <div class="icon-circle">
                  <!--アイコン画像-->
                  <img class="thumbnail-img" src="../../static/asset/images/icon/totyuicon.png" th:src="@{/asset/images/icon/totyuicon.png}">
                </div>
                <!--ボタンの文字-->
                <span class="label">途中から</span>
              </button>
              <div class="theme-list">
                <!--テーマカードが入る-->
              </div>
            </div>
          </template>

          <!--テーマのテンプレート-->
          <template id="theme-card-template">
            <button class="area-card">
              <!--アイコンを丸く囲う-->
              <div class="icon-circle">
                <!--アイコン画像-->
                <img class="thumbnail-img" src="../../static/asset/images/totyuicon.png" th:src="@{/asset/images/totyuicon.png}">
              </div>
              <!--ボタンの文字-->
              <span class="label">途中から</span>
            </button>
          </template>

        </div>
      </div>
    </main>
    
    <!-- Footer -->
    <footer class="app-footer">
      <!-- Bottom actions -->
      <div class="bottom-actions">
        <!--設定画面へ遷移するボタン-->
        <button class="action-btn menu-btn" type="button">
          <!--ボタンのラベル-->
          <div class ="caption">メニュー</div>
          <!--メニューアイコン-->
          <img class = "icon-img" src = "../../static/asset/images/menulogo.png" th:src="@{asset/images/menulogo.png}"/>
        </button>

        <!--投稿画面へ遷移-->
        <button class="action-btn" type="button" onclick= "location.href='/spotpost/capture'" >
          <!--ボタンのラベル-->
          <div class="caption">トイスポットを投稿</div>
          <!--投稿用アイコン-->
          <img class = "icon-img" src = "../../static/asset/images/icon/icon_post.png" th:src="@{/asset/images/icon/icon_post.png}"/>
        </button>
      </div> 
    </footer>
  
  <!-- Leaflet JSライブラリ -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- homeの制御スクリプト -->
  <script type ="module" src="../../static/js/pages/home.js" th:src="@{/js/pages/home.js}"></script>
</body>
</html>
