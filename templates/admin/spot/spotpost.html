<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>spotsearch</title>
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  #map {
    width: 500px;
    height: 400px;
    margin-top: 10px;
    border: 1px solid #ccc;
  }
  #preview img {
      width: 20vw;
      height: auto;
      display: inline-block;
      margin-right: 4px;
      margin-top: 4px;
    }
	/* tag styles */
	.tag { display: inline-flex; align-items: center; background: #eef; color:#033; padding: 4px 8px; margin:4px; border-radius: 12px; font-size: 0.9rem; }
	.tag .tag-remove { background: transparent; border: none; margin-left: 8px; cursor: pointer; font-weight: bold; color: #900; }
	#tag-input { padding:6px 8px; font-size:1rem; }
	#tag-input-area { margin-bottom:6px; }
</style>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="../../../static/js/admin/spotpost/adminspotpost.js" th:src="@{/js/admin/spotpost/adminspotpost.js}"></script>
</head>
<body>
	<form class="postingformarea" action="#"
					th:action="@{/admin/adminspotpost}" method="post" enctype="multipart/form-data" th:object="${spotpost}">
		<h1>投稿フォーム</h1>

		<div>
			<h2>緯度(下の地図で選択することで自動的に埋まります)</h2>
			<input type="number" step="0.0000001" th:field="*{latitude}" id="latitude">

			<h2>経度(下の地図で選択することで自動的に埋まります)</h2>
			<input type="number" step="0.0000001" th:field="*{longitude}" id="longitude">
		</div>

		<!-- 地図 -->
		<div>
			<h2>地図から選択</h2>
			<div id="map"></div>
		</div>

		<div>
			<h2>画像</h2>
			<input type="file" name="image[]" multiple="multiple"  
			       accept=".png, .jpg, .jpeg, .gif" id="postingfile" th:field="*{images}">
		</div>
		<div id="preview">
		</div>

		<div>
			<h2> 説明</h2>
			<textarea th:field="*{description}" rows="4" cols="50"></textarea>
		</div>

		<div>
			<h2>タグ</h2>
			<div id="tag-input-area">
				<input type="text" id="tag-input" placeholder="タグを入力してEnterで追加" autocomplete="off">
				<button type="button" id="add-tag-btn">追加</button>
			</div>
			<div id="tag-list" aria-live="polite"></div>
			<!-- Hidden inputs for tags will be appended here by JS (name="tags") -->

		<div class="postingformsubmit">
			<input type="submit" value="投稿">
		</div>
		<input type="hidden" th:csrf />
	</form>

	
	
	<!-- Leaflet JS -->
	<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
	<script>
		
	  //地図の処理
	  
	  // 初期位置（例：京都駅）
	  var initialLat = 34.9864338;
	  var initialLng = 135.7602079;

	  // 地図を生成
	  var map = L.map('map').setView([initialLat, initialLng], 13);

	  // タイルレイヤー追加 (OSM)
	  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
	    maxZoom: 19,
	    attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
	  }).addTo(map);

	  // マーカー用変数
	  var marker;

	  // 地図クリックイベント
	  map.on('click', function(e) {
	    var lat = e.latlng.lat.toFixed(7);
	    var lng = e.latlng.lng.toFixed(7);

	    // inputに値をセット
	    document.getElementById("latitude").value = lat;
	    document.getElementById("longitude").value = lng;

	    // 既存マーカー削除
	    if (marker) {
	      map.removeLayer(marker);
	    }
	    // 新しいマーカーを置く
	    marker = L.marker([lat, lng]).addTo(map);
	  });
	  
	  //プレビュー処理
	  
	  // ファイル選択時のプレビュー処理
	    document.getElementById('postingfile').addEventListener('change', function(e) {
	      var preview = document.getElementById('preview');
	      preview.innerHTML = ""; // 以前のプレビューをクリア
	  
	      var files = e.target.files;
	      var maxFiles = 4; // 最大4枚まで
	  
	      Array.from(files).slice(0, maxFiles).forEach(file => {
	        if (!file.type.match('image.*')) return;
	  
	        var reader = new FileReader();
	        reader.onload = function(evt) {
	          var img = document.createElement("img");
	          img.src = evt.target.result;
	          preview.appendChild(img);
	        };
	        reader.readAsDataURL(file);
	      });
	    });

	  // タグ入力の処理
	  (function(){
	    var form = document.querySelector('.postingformarea');
	    var tagInput = document.getElementById('tag-input');
	    var addBtn = document.getElementById('add-tag-btn');
	    var tagList = document.getElementById('tag-list');
	    var tags = [];

	    function createHiddenInput(tag){
	      var input = document.createElement('input');
	      input.type = 'hidden';
	      input.name = 'tags';
	      input.value = tag;
	      input.dataset.tagValue = tag;
	      return input;
	    }

	    function renderTag(tag){
	      var span = document.createElement('span');
	      span.className = 'tag';
	      span.dataset.tag = tag;
	      span.textContent = tag;

	      var remove = document.createElement('button');
	      remove.type = 'button';
	      remove.className = 'tag-remove';
	      remove.textContent = '×';
	      remove.addEventListener('click', function(){
	        tags = tags.filter(function(t){ return t !== tag; });
	        var hidden = form.querySelector('input[type="hidden"][name="tags"][data-tag-value="'+tag+'"]');
	        if(hidden) hidden.remove();
	        span.remove();
	      });

	      span.appendChild(remove);
	      tagList.appendChild(span);
	    }

	    function addTagFromInput(){
	      var v = tagInput.value.trim();
	      if(!v) return;
	      // allow comma-separated multiple
	      var parts = v.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
	      parts.forEach(function(p){
				// normalize: force single leading '#'
				var norm = p.replace(/^#+/, '');
				if(!norm) return;
				norm = '#' + norm;
				if(tags.indexOf(norm) !== -1) return;
				tags.push(norm);
				form.appendChild(createHiddenInput(norm));
				renderTag(norm);
	      });
	      tagInput.value = '';
	      tagInput.focus();
	    }

	    tagInput.addEventListener('keydown', function(e){
	      if(e.key === 'Enter'){
	        e.preventDefault();
	        addTagFromInput();
	      } else if(e.key === ','){
	        e.preventDefault();
	        addTagFromInput();
	      }
	    });

	    addBtn.addEventListener('click', addTagFromInput);
	  })();
	</script>
</body>
</html>
