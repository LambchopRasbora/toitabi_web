<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>spotsearch</title>
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  #map {
    width: 500px;
    height: 400px;
    margin-top: 10px;
    border: 1px solid #ccc;
  }
  #preview img {
      width: 20vw;
      height: auto;
      display: inline-block;
      margin-right: 4px;
      margin-top: 4px;
    }
	/* tag styles */
	.tag { display: inline-flex; align-items: center; background: #eef; color:#033; padding: 4px 8px; margin:4px; border-radius: 12px; font-size: 0.9rem; }
	.tag .tag-remove { background: transparent; border: none; margin-left: 8px; cursor: pointer; font-weight: bold; color: #900; }
	#tag-input { padding:6px 8px; font-size:1rem; }
	#tag-input-area { margin-bottom:6px; }
</style>
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="../../../static/js/admin/spotpost/adminspotpost.js" th:src="@{/js/admin/spotpost/adminspotpost.js}"></script>
</head>
<body>
	<form class="postingformarea" action="#"
					th:action="@{/admin/adminspotpost}" method="post" enctype="multipart/form-data" th:object="${spotpost}">
		<h1>投稿フォーム</h1>

		<div>
			<h2>緯度(下の地図で選択することで自動的に埋まります)</h2>
			<input type="number" step="0.0000001" th:field="*{latitude}" id="latitude">

			<h2>経度(下の地図で選択することで自動的に埋まります)</h2>
			<input type="number" step="0.0000001" th:field="*{longitude}" id="longitude">
		</div>

		<!-- 地図 -->
		<div>
			<h2>地図から選択</h2>
			<div id="map"></div>
		</div>

		<div>
			<h2>画像</h2>
			<input type="file" name="image[]" multiple="multiple"  
			       accept=".png, .jpg, .jpeg, .gif" id="postingfile" th:field="*{images}">
		</div>
		<div id="preview">
		</div>

		<div>
			<h2> 説明</h2>
			<textarea th:field="*{description}" rows="4" cols="50"></textarea>
		</div>

		<div>
			<h2>タグ</h2>
			<div id="tag-input-area">
				<input type="text" id="tag-input" placeholder="タグを入力してEnterで追加" autocomplete="off">
				<button type="button" id="add-tag-btn">追加</button>
			</div>
			<div id="tag-list" aria-live="polite"></div>
			<!-- Hidden inputs for tags will be appended here by JS (name="tags") -->

		<div class="postingformsubmit">
			<input type="submit" value="投稿">
		</div>
		<input type="hidden" th:csrf />
	</form>
</body>
</html>
